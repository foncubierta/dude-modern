services:
  backend:
    build: ./backend
    container_name: dude-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/dude.db

  frontend:
    build: ./frontend
    container_name: dude-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
